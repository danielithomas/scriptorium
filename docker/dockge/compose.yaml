services:
  dockge:
    image: louislam/dockge:1
    restart: unless-stopped
    ports:
      - "${DOCKGE_PORT:-5001}:5001"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./data:/app/data
      - ${STACKS_DIR:-/data/docker}:/data/docker
    environment:
      - DOCKGE_STACKS_DIR=/data/docker
