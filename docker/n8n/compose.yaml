services:
  n8n:
    image: n8nio/n8n:latest
    container_name: n8n
    restart: unless-stopped
    ports:
      - "${N8N_PORT:-5678}:5678"
    environment:
      - N8N_HOST=0.0.0.0
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - GENERIC_TIMEZONE=${TZ:-UTC}
      - N8N_SECURE_COOKIE=false
      - TZ=${TZ:-UTC}
    volumes:
      - ${N8N_DATA:-./data}:/home/node/.n8n
