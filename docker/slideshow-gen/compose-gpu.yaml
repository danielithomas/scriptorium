# Slideshow Generator — NVIDIA GPU variant (API server)
# Target: NVIDIA RTX GPU hosts (e.g., RTX 5080)
# Requires: nvidia-container-toolkit on host

services:
  slideshow-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: slideshow-gpu
    restart: unless-stopped
    runtime: nvidia
    ports:
      - "${API_PORT:-8189}:8080"
    volumes:
      - ${DATA_PATH:-./data}:/data
      - ${MODELS_PATH:-./models}:/models
      # Legacy CLI mode volumes (optional)
      - ${INPUT_PATH:-./input}:/input:ro
      - ${OUTPUT_PATH:-./output}:/output
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
      - MUSICGEN_MODEL=${MUSICGEN_MODEL:-facebook/musicgen-large}
      - DEVICE=cuda
      - TTS_DEVICE=cuda
      - FFMPEG_ENCODER=${FFMPEG_ENCODER:-h264_nvenc}
      - NUM_THREADS=${NUM_THREADS:-24}
      - MUSIC_VOLUME=${MUSIC_VOLUME:-0.12}
      - HF_TOKEN=${HF_TOKEN:-}
      - JOBS_DIR=/data/jobs
      - MAX_STORED_JOBS=${MAX_STORED_JOBS:-20}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8080/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
