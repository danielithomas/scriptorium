# Slideshow Generator — NVIDIA GPU variant
# Target: NVIDIA RTX GPU hosts (e.g., RTX 5080)
# Requires: nvidia-container-toolkit on host

services:
  slideshow-gpu:
    build:
      context: .
      dockerfile: Dockerfile.gpu
    container_name: slideshow-gpu
    runtime: nvidia
    volumes:
      - ${INPUT_PATH:-./input}:/input:ro
      - ${OUTPUT_PATH:-./output}:/output
      - ${MODELS_PATH:-./models}:/models
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=compute,video,utility
      - MUSICGEN_MODEL=${MUSICGEN_MODEL:-facebook/musicgen-large}
      - DEVICE=cuda
      - TTS_DEVICE=cuda
      - FFMPEG_ENCODER=${FFMPEG_ENCODER:-h264_nvenc}
      - NUM_THREADS=${NUM_THREADS:-24}
      - MUSIC_VOLUME=${MUSIC_VOLUME:-0.2}
      - HF_TOKEN=${HF_TOKEN:-}
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    command: ["--input=/input/script.json", "--output=/output/final.mp4"]
