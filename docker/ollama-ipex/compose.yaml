services:
  ollama-ipex:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: ollama-ipex
    restart: unless-stopped
    devices:
      - /dev/dri:/dev/dri
    volumes:
      - ${OLLAMA_DATA:-./data}:/root/.ollama
    ports:
      - "${OLLAMA_PORT:-11435}:11434"
    environment:
      - ONEAPI_DEVICE_SELECTOR=level_zero:0
      - ZES_ENABLE_SYSMAN=1
      - OLLAMA_INTEL_GPU=true
      - IPEX_LLM_NUM_CTX=${NUM_CTX:-16384}
      - OLLAMA_HOST=0.0.0.0
    shm_size: "16g"
