server:
  host: 0.0.0.0
  port: 8004
  use_ngrok: false
  use_auth: false

model:
  repo_id: chatterbox-turbo

tts_engine:
  device: cpu  # Change to 'cuda' for NVIDIA GPU
  predefined_voices_path: voices
  reference_audio_path: reference_audio
  default_voice_id: Emily.wav

paths:
  model_cache: model_cache
  output: outputs

generation_defaults:
  temperature: 0.8
  exaggeration: 1.3
  cfg_weight: 0.5
  seed: 0
  speed_factor: 1.0
  language: en

audio_output:
  format: wav
  sample_rate: 24000
  max_reference_duration_sec: 30
  save_to_disk: false
